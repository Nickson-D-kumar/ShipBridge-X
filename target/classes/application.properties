## ── Server ────────────────────────────────────────────────
server.port=8080

## ── SQLite via JPA ────────────────────────────────────────
## IMPORTANT: Uses an absolute path so the same DB file is always used
## regardless of which directory the app is launched from.
## The DB file lives at: <project-root>/data/courier.db
spring.datasource.url=jdbc:sqlite:${user.dir}/data/courier.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.username=
spring.datasource.password=

## ── Hibernate / JPA ───────────────────────────────────────
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
## "update" = add new columns/tables but NEVER drop or erase existing data
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

## ── Thymeleaf ─────────────────────────────────────────────
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

## ── App name ──────────────────────────────────────────────
spring.application.name=courier-system
